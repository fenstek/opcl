# ──────────────────────────────────────────────────────────────────────────────
# upstream-sync.yml — PR-based синхронизация форка с openclaw/openclaw
#
# Логика:
#   1. Fetch upstream/main
#   2. Если новых коммитов нет — выходим (отчёт в лог)
#   3. Если есть — создаём ветку sync/upstream-YYYYMMDD-<shortsha>
#   4. Rebase ветки на upstream/main (без -X theirs — fail при конфликте)
#   5. Push ветки в origin (не force в main)
#   6. Открываем PR в main (или авто-мерджим при auto_merge=true)
#   7. Telegram уведомление
#
# Секреты (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN  — токен Telegram-бота      (необязательно)
#   TELEGRAM_CHAT_ID    — chat_id получателя        (необязательно)
# ──────────────────────────────────────────────────────────────────────────────

name: Upstream Sync

on:
  schedule:
    # Ежедневно в 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — не пушить и не создавать PR'
        required: false
        default: 'false'
        type: boolean
      force_sync:
        description: 'Форсировать sync даже если нет новых коммитов'
        required: false
        default: 'false'
        type: boolean
      auto_merge:
        description: 'Авто-мерджить PR после создания (rebase merge)'
        required: false
        default: 'false'
        type: boolean

# Предотвращаем параллельные запуски sync
concurrency:
  group: upstream-sync
  cancel-in-progress: false

# Минимальные права на уровне workflow
permissions:
  contents: read

env:
  UPSTREAM_REMOTE: upstream
  UPSTREAM_REPO: https://github.com/openclaw/openclaw.git
  UPSTREAM_BRANCH: main
  ORIGIN_BRANCH: main

jobs:
  sync:
    name: Sync with upstream
    runs-on: ubuntu-latest
    # Права только там где нужны
    permissions:
      contents: write       # push sync branch
      pull-requests: write  # create PR
    outputs:
      synced:        ${{ steps.check.outputs.synced }}
      commits_ahead: ${{ steps.check.outputs.commits_ahead }}
      upstream_sha:  ${{ steps.check.outputs.upstream_sha }}
      origin_sha:    ${{ steps.check.outputs.origin_sha }}
      sync_branch:   ${{ steps.branch.outputs.sync_branch }}
      rebase_status: ${{ steps.rebase.outputs.status }}
      pr_url:        ${{ steps.pr.outputs.pr_url }}
      pr_number:     ${{ steps.pr.outputs.pr_number }}

    steps:
      # ── 1. Checkout (полная история нужна для rebase) ────────────────────────
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Git identity ───────────────────────────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.email "actions-sync@github.com"
          git config user.name  "Upstream Sync Bot"

      # ── 3. Добавить upstream remote и fetch ──────────────────────────────────
      - name: Add upstream remote and fetch
        run: |
          if git remote get-url "$UPSTREAM_REMOTE" &>/dev/null; then
            echo "Remote '$UPSTREAM_REMOTE' already exists — updating URL"
            git remote set-url "$UPSTREAM_REMOTE" "$UPSTREAM_REPO"
          else
            git remote add "$UPSTREAM_REMOTE" "$UPSTREAM_REPO"
            echo "Added remote '$UPSTREAM_REMOTE' -> $UPSTREAM_REPO"
          fi
          git fetch "$UPSTREAM_REMOTE" "$UPSTREAM_BRANCH" --prune

      # ── 4. Проверить наличие новых коммитов ──────────────────────────────────
      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse "${UPSTREAM_REMOTE}/${UPSTREAM_BRANCH}")
          ORIGIN_SHA=$(git rev-parse "origin/${ORIGIN_BRANCH}")
          COMMITS_AHEAD=$(git log --oneline \
            "origin/${ORIGIN_BRANCH}".."${UPSTREAM_REMOTE}/${UPSTREAM_BRANCH}" \
            | wc -l | tr -d ' ')

          echo "upstream_sha=${UPSTREAM_SHA}"   >> "$GITHUB_OUTPUT"
          echo "origin_sha=${ORIGIN_SHA}"       >> "$GITHUB_OUTPUT"
          echo "commits_ahead=${COMMITS_AHEAD}" >> "$GITHUB_OUTPUT"

          echo "upstream/main : ${UPSTREAM_SHA}"
          echo "origin/main   : ${ORIGIN_SHA}"
          echo "New upstream commits: ${COMMITS_AHEAD}"

          if [[ "$COMMITS_AHEAD" -eq 0 && "${{ inputs.force_sync }}" != "true" ]]; then
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "-> Already up to date. No action needed."
          else
            echo "synced=true" >> "$GITHUB_OUTPUT"
            echo "-> ${COMMITS_AHEAD} new commit(s) detected — will sync via PR."
          fi

      # ── 5. Лог если актуально ────────────────────────────────────────────────
      - name: Log — already up to date
        if: steps.check.outputs.synced == 'false'
        run: |
          echo "================================================"
          echo "  UPSTREAM SYNC -- $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "================================================"
          echo "  Status        : UP TO DATE"
          echo "  upstream/main : ${{ steps.check.outputs.upstream_sha }}"
          echo "  No action required."
          echo "================================================"

      # ── 6. Создать sync ветку ────────────────────────────────────────────────
      - name: Create sync branch
        id: branch
        if: steps.check.outputs.synced == 'true'
        run: |
          DATE=$(date -u '+%Y%m%d')
          SHORT_SHA=$(echo "${{ steps.check.outputs.upstream_sha }}" | cut -c1-8)
          SYNC_BRANCH="sync/upstream-${DATE}-${SHORT_SHA}"
          echo "sync_branch=${SYNC_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Creating branch: ${SYNC_BRANCH}"
          git checkout "$ORIGIN_BRANCH"
          git checkout -b "$SYNC_BRANCH"

      # ── 7. Rebase (без -X theirs — fail при конфликте) ───────────────────────
      - name: Rebase onto upstream/main
        id: rebase
        if: steps.check.outputs.synced == 'true'
        run: |
          set -euo pipefail

          # Без -X theirs: конфликт = fail (требуется ручное разрешение)
          if git rebase "${UPSTREAM_REMOTE}/${UPSTREAM_BRANCH}"; then
            NEW_SHA=$(git rev-parse HEAD)
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "Rebase succeeded -> new HEAD: ${NEW_SHA}"
          else
            git rebase --abort || true
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "::error::Rebase FAILED with conflicts. Manual intervention required."
            exit 1
          fi

      # ── 8. Push sync ветки в origin ──────────────────────────────────────────
      - name: Push sync branch to origin
        if: >-
          steps.check.outputs.synced == 'true' &&
          steps.rebase.outputs.status == 'success' &&
          inputs.dry_run != 'true'
        run: |
          SYNC_BRANCH="${{ steps.branch.outputs.sync_branch }}"
          git push origin "${SYNC_BRANCH}" --force-with-lease
          echo "Pushed branch ${SYNC_BRANCH} to origin"

      - name: Dry run — would push branch
        if: >-
          steps.check.outputs.synced == 'true' &&
          steps.rebase.outputs.status == 'success' &&
          inputs.dry_run == 'true'
        run: |
          SYNC_BRANCH="${{ steps.branch.outputs.sync_branch }}"
          echo "[DRY RUN] Would push branch ${SYNC_BRANCH} to origin"
          echo "[DRY RUN] Would open PR: ${SYNC_BRANCH} -> ${ORIGIN_BRANCH}"
          echo "[DRY RUN] No changes made."

      # ── 9. Открыть PR ────────────────────────────────────────────────────────
      - name: Create or find PR
        id: pr
        if: >-
          steps.check.outputs.synced == 'true' &&
          steps.rebase.outputs.status == 'success' &&
          inputs.dry_run != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const syncBranch  = '${{ steps.branch.outputs.sync_branch }}';
            const baseBranch  = process.env.ORIGIN_BRANCH;
            const commits     = '${{ steps.check.outputs.commits_ahead }}';
            const upstreamSha = '${{ steps.check.outputs.upstream_sha }}'.slice(0, 12);

            const title = `chore(sync): upstream sync ${new Date().toISOString().slice(0,10)} (${commits} commit(s))`;
            const body = [
              '## Upstream Sync',
              '',
              'Автоматическая синхронизация с `openclaw/openclaw` upstream.',
              '',
              `- **Upstream SHA**: \`${upstreamSha}\``,
              `- **Новых коммитов**: ${commits}`,
              `- **Ветка**: \`${syncBranch}\``,
              '',
              '> Создано автоматически workflow [`upstream-sync.yml`](.github/workflows/upstream-sync.yml)',
            ].join('\n');

            // Ищем существующий открытый PR для этой ветки
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${syncBranch}`,
              state: 'open',
            });

            let pr;
            if (existing.data.length > 0) {
              pr = existing.data[0];
              core.info(`Found existing PR #${pr.number}: ${pr.html_url}`);
            } else {
              const created = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                head:  syncBranch,
                base:  baseBranch,
              });
              pr = created.data;
              core.info(`Created PR #${pr.number}: ${pr.html_url}`);
            }

            core.setOutput('pr_url',    pr.html_url);
            core.setOutput('pr_number', String(pr.number));

      # ── 10. Авто-мердж (только при explicit auto_merge=true) ─────────────────
      - name: Auto-merge PR
        if: >-
          steps.check.outputs.synced == 'true' &&
          steps.rebase.outputs.status == 'success' &&
          inputs.dry_run != 'true' &&
          inputs.auto_merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.pr_number }}', 10);
            await github.rest.pulls.merge({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              pull_number:  prNumber,
              merge_method: 'rebase',
            });
            core.info(`Auto-merged PR #${prNumber} via rebase`);

      # ── 11. Финальный отчёт ───────────────────────────────────────────────────
      - name: Sync report
        if: steps.check.outputs.synced == 'true'
        run: |
          DRY=""
          [[ "${{ inputs.dry_run }}" == "true" ]] && DRY=" (DRY RUN)"
          echo "================================================"
          echo "  UPSTREAM SYNC -- $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "================================================"
          echo "  Status         : SYNCED${DRY}"
          echo "  upstream/main  : ${{ steps.check.outputs.upstream_sha }}"
          echo "  Sync branch    : ${{ steps.branch.outputs.sync_branch }}"
          echo "  Commits        : ${{ steps.check.outputs.commits_ahead }}"
          [[ -n "${{ steps.pr.outputs.pr_url }}" ]] && \
            echo "  PR             : ${{ steps.pr.outputs.pr_url }}"
          echo "================================================"

  # ── Telegram уведомление ──────────────────────────────────────────────────────
  notify:
    name: Telegram notification
    needs: sync
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          SYNC_RESULT:   ${{ needs.sync.result }}
          SYNCED:        ${{ needs.sync.outputs.synced }}
          COMMITS:       ${{ needs.sync.outputs.commits_ahead }}
          UPSTREAM_SHA:  ${{ needs.sync.outputs.upstream_sha }}
          SYNC_BRANCH:   ${{ needs.sync.outputs.sync_branch }}
          REBASE_STATUS: ${{ needs.sync.outputs.rebase_status }}
          PR_URL:        ${{ needs.sync.outputs.pr_url }}
        run: |
          if [[ -z "$BOT_TOKEN" || -z "$CHAT_ID" ]]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not configured — skipping."
            exit 0
          fi

          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "$SYNC_RESULT" == "success" && "$SYNCED" == "false" ]]; then
            TEXT="$(printf '\u2705 Upstream Sync\n%s\n\u0410\u043a\u0442\u0443\u0430\u043b\u044c\u043d\u043e \u2014 \u043d\u043e\u0432\u044b\u0445 \u043a\u043e\u043c\u043c\u0438\u0442\u043e\u0432 \u043d\u0435\u0442.' "$DATE")"

          elif [[ "$SYNC_RESULT" == "success" && "$SYNCED" == "true" ]]; then
            PR_LINE=""
            [[ -n "$PR_URL" ]] && PR_LINE="$(printf '\nPR: %s' "$PR_URL")"
            TEXT="$(printf '\U0001f504 Upstream Sync\n%s\n\u0410\u0431\u0441\u043e\u0440\u0431\u0438\u0440\u043e\u0432\u0430\u043d\u043e: %s \u043a\u043e\u043c\u043c\u0438\u0442\u043e\u0432\nUpstream: %s\n\u0412\u0435\u0442\u043a\u0430: %s%s\n\u041b\u043e\u0433: %s' \
              "$DATE" "$COMMITS" "${UPSTREAM_SHA:0:12}" "$SYNC_BRANCH" "$PR_LINE" "$RUN_URL")"

          elif [[ "$REBASE_STATUS" == "conflict" ]]; then
            TEXT="$(printf '\u26a0\ufe0f Upstream Sync \u2014 \u041a\u041e\u041d\u0424\u041b\u0418\u041a\u0422\n%s\nRebase \u0437\u0430\u0432\u0435\u0440\u0448\u0438\u043b\u0441\u044f \u0441 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u043c.\n\u0422\u0440\u0435\u0431\u0443\u0435\u0442\u0441\u044f \u0440\u0443\u0447\u043d\u043e\u0435 \u0432\u043c\u0435\u0448\u0430\u0442\u0435\u043b\u044c\u0441\u0442\u0432\u043e.\n\u041b\u043e\u0433: %s' \
              "$DATE" "$RUN_URL")"

          else
            TEXT="$(printf '\u274c Upstream Sync \u2014 \u043e\u0448\u0438\u0431\u043a\u0430\n%s\nsync: %s\n\u041b\u043e\u0433: %s' \
              "$DATE" "$SYNC_RESULT" "$RUN_URL")"
          fi

          curl -sS -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=" \
            > /dev/null && echo "Telegram: sent." || echo "Telegram: send failed (non-fatal)."
