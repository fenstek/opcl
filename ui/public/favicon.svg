<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Crab emoji-style SVG 🦀 -->

  <!-- Body (main shell) -->
  <ellipse cx="60" cy="65" rx="32" ry="24" fill="#E8472A"/>

  <!-- Shell texture (highlight) -->
  <ellipse cx="60" cy="60" rx="26" ry="18" fill="#F05C3A" opacity="0.6"/>
  <ellipse cx="60" cy="56" rx="18" ry="11" fill="#F47050" opacity="0.4"/>

  <!-- Head -->
  <ellipse cx="60" cy="44" rx="18" ry="13" fill="#E8472A"/>

  <!-- Eyes stalks -->
  <rect x="46" y="30" width="4" height="10" rx="2" fill="#C0392B"/>
  <rect x="70" y="30" width="4" height="10" rx="2" fill="#C0392B"/>

  <!-- Eyes -->
  <circle cx="48" cy="29" r="6" fill="#1a1a1a"/>
  <circle cx="72" cy="29" r="6" fill="#1a1a1a"/>
  <circle cx="49.5" cy="27.5" r="2" fill="white"/>
  <circle cx="73.5" cy="27.5" r="2" fill="white"/>

  <!-- Left big claw -->
  <g transform="rotate(-20, 30, 55)">
    <rect x="10" y="48" width="22" height="10" rx="5" fill="#E8472A"/>
    <!-- Claw pincer top -->
    <path d="M10 48 Q2 42 5 35 Q10 30 18 36 L18 48Z" fill="#D44025"/>
    <!-- Claw pincer bottom -->
    <path d="M10 58 Q2 64 5 71 Q10 76 18 70 L18 58Z" fill="#D44025"/>
  </g>

  <!-- Right big claw -->
  <g transform="rotate(20, 90, 55)">
    <rect x="88" y="48" width="22" height="10" rx="5" fill="#E8472A"/>
    <!-- Claw pincer top -->
    <path d="M110 48 Q118 42 115 35 Q110 30 102 36 L102 48Z" fill="#D44025"/>
    <!-- Claw pincer bottom -->
    <path d="M110 58 Q118 64 115 71 Q110 76 102 70 L102 58Z" fill="#D44025"/>
  </g>

  <!-- Left legs (3 legs) -->
  <line x1="28" y1="62" x2="14" y2="72" stroke="#C0392B" stroke-width="4" stroke-linecap="round"/>
  <line x1="28" y1="68" x2="12" y2="82" stroke="#C0392B" stroke-width="4" stroke-linecap="round"/>
  <line x1="30" y1="75" x2="16" y2="88" stroke="#C0392B" stroke-width="4" stroke-linecap="round"/>

  <!-- Right legs (3 legs) -->
  <line x1="92" y1="62" x2="106" y2="72" stroke="#C0392B" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="68" x2="108" y2="82" stroke="#C0392B" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="75" x2="104" y2="88" stroke="#C0392B" stroke-width="4" stroke-linecap="round"/>

  <!-- Mouth / smile -->
  <path d="M52 50 Q60 56 68 50" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Shell dots -->
  <circle cx="60" cy="68" r="3" fill="#D44025" opacity="0.5"/>
  <circle cx="50" cy="72" r="2" fill="#D44025" opacity="0.4"/>
  <circle cx="70" cy="72" r="2" fill="#D44025" opacity="0.4"/>
</svg>
